name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No cancel-in-progress: during a multi-agent wave every commit is a real
# correctness change we want independently verified, so let each run complete
# rather than cancelling on the next push. Concurrent hosted-runner jobs are
# fine; per-commit CI signal is worth the minutes for a conformance project.

env:
  # Pinned libaom oracle commit (see reference/BUILD_CONFIG.md). Bump the cache
  # key salt (-vN) when the pin or build config changes.
  LIBAOM_SHA: 03087864cf4bea6abb0d28f95cf7843511413d8f

jobs:
  test-linux:
    name: linux differential (x86-64)
    runs-on: ubuntu-latest
    steps:
      # `submodules: recursive` checks out the pinned libaom C oracle at
      # `upstream/`; the cargo-driven aom-sys-ref/build.rs builds it from there.
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install C-oracle build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm cmake ninja-build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Every crate links the C libaom oracle via aom-sys-ref, so the whole
      # workspace needs it built. aom-sys-ref/build.rs builds it from the
      # `upstream/` submodule into `upstream/build/`. Cache that build keyed on
      # the pinned commit — after the first run the build.rs SHA stamp skips the
      # rebuild and this restores in seconds.
      - name: Cache libaom oracle build
        uses: actions/cache@v6
        with:
          path: upstream/build
          key: libaom-${{ runner.os }}-${{ env.LIBAOM_SHA }}-v2

      - name: Build C libaom oracle (cargo-driven)
        run: cargo build -p zenav1-aom-sys-ref

      # Deterministically provision the Gate-1 conformance corpus. The workspace
      # conformance test (conformance_corpus.rs) fail-loud-asserts when
      # conformance/data/ is empty — correct (no silent skip), but non-hermetic
      # unless the corpus is actually provisioned. Fetch libaom's own sha1-pinned
      # intra-scope vectors (name+sha1 from the `upstream/` submodule's
      # test-data.sha1 manifest; bytes from storage.googleapis.com/aom-test-data).
      # Cached, keyed on the manifest, so later runs restore in seconds and
      # re-verify without re-downloading.
      - name: Cache conformance corpus
        uses: actions/cache@v6
        with:
          path: conformance/data
          key: conformance-intra-${{ runner.os }}-${{ hashFiles('upstream/test/test-data.sha1') }}-v1
      - name: Provision conformance corpus (intra scope)
        run: python3 xtask/conformance.py --fetch --scope intra

      # archmage/magetypes (SIMD dispatch) come from crates.io ("0.9.27") —
      # the former absolute-path dep + CI clone workaround was migrated per
      # its TODO (Gate-3 SIMD work needs ONE archmage instance workspace-wide
      # so the AOM_FORCE_SCALAR token pin reaches every kernel crate).

      - name: Test workspace (differential vs C oracle)
        run: cargo test --workspace --no-fail-fast

  # SCALAR-PIN mode (Gate-3 parity rule 3): AOM_FORCE_SCALAR disables every
  # archmage SIMD token process-wide (aom_dsp::dispatch), so every kernel
  # dispatch falls through to `_scalar` = the transcribed C port, verbatim.
  # The FULL suite passing here proves SIMD work left the scalar path
  # untouched. Locally: `just test-scalar`.
  test-linux-scalar-pinned:
    name: linux differential (forced-scalar pin)
    runs-on: ubuntu-latest
    env:
      AOM_FORCE_SCALAR: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install C-oracle build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm cmake ninja-build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache libaom oracle build
        uses: actions/cache@v6
        with:
          path: upstream/build
          key: libaom-${{ runner.os }}-${{ env.LIBAOM_SHA }}-v2
      - name: Build C libaom oracle (cargo-driven)
        run: cargo build -p zenav1-aom-sys-ref
      - name: Cache conformance corpus
        uses: actions/cache@v6
        with:
          path: conformance/data
          key: conformance-intra-${{ runner.os }}-${{ hashFiles('upstream/test/test-data.sha1') }}-v1
      - name: Provision conformance corpus (intra scope)
        run: python3 xtask/conformance.py --fetch --scope intra
      - name: Test workspace under the scalar pin
        run: cargo test --workspace --no-fail-fast

  # ORG-BAR PLATFORM MATRIX — pure-Rust portability (no C oracle).
  #
  # Invariant A (issue #3): a downstream consumer of any published crate builds
  # with NO C toolchain, NO cmake, NO build.rs — the C libaom oracle is a
  # dev-dependency of the differential harness only, never a normal dependency
  # of a shipping crate. These jobs exercise exactly that surface on the mandated
  # org-bar platforms: build the four published crates (facade + dsp + decode +
  # encode) and the decode-only stack, then run the oracle-free facade tests.
  # This is what catches pointer-width bugs (i686), Windows-aarch64, and macOS-x86
  # regressions in the pure-Rust port. `cargo build`/`test` of these crates pulls
  # in neither aom-sys-ref nor its build.rs, so no cmake/nasm is needed here.
  #
  # The full C-oracle DIFFERENTIAL gate runs on the two linux jobs above. Building
  # libaom for these targets in CI (32-bit nasm/cmake for i686; MSVC + AV1 assembly
  # for windows-arm) is a dedicated sub-project, so the differential is gated OFF
  # here — NOT silently skipped: it is simply not invoked on these runners, and
  # this comment says why. macos-15-intel is the most likely next candidate to
  # gain the full differential (brew nasm/cmake + the portable aom-sys-ref build.rs).
  # These runners are unverified-pending-CI at landing (labels + toolchains match
  # the org runner set; the first CI run confirms the pure-Rust build is green).
  portability:
    name: portability ${{ matrix.name }} (pure-Rust, no C oracle)
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-11-arm
            os: windows-11-arm
          - name: macos-15-intel
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      # No submodules: the pure-Rust consumer surface never touches upstream/.
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the published crates (no C toolchain)
        run: cargo build -p zenav1-aom -p zenav1-aom-dsp -p zenav1-aom-decode -p zenav1-aom-encode
      - name: Build the decode-only stack (wasm / size-sensitive consumers)
        run: cargo build -p zenav1-aom --no-default-features --features decode
      - name: Test the oracle-free facade
        run: cargo test -p zenav1-aom

  # i686 is a primary target (32-bit correctness for WASM compatibility + catching
  # pointer-width bugs, per CLAUDE.md). Built via `cross` (Docker) — same pure-Rust,
  # no-C-oracle surface as the native runners above.
  portability-i686:
    name: portability i686-unknown-linux-gnu (pure-Rust, no C oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --locked
      - name: Build the published crates for i686 (32-bit pointer-width)
        run: cross build --target i686-unknown-linux-gnu -p zenav1-aom -p zenav1-aom-dsp -p zenav1-aom-decode -p zenav1-aom-encode
      - name: Build the decode-only stack for i686
        run: cross build --target i686-unknown-linux-gnu -p zenav1-aom --no-default-features --features decode
      - name: Test the oracle-free facade on i686 (under qemu)
        run: cross test --target i686-unknown-linux-gnu -p zenav1-aom
